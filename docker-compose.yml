version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: canteen_mysql
    platform: linux/arm64/v8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: canteen_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canteen_network

  redis:
    image: redis:7-alpine
    container_name: canteen_redis
    platform: linux/arm64/v8
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - canteen_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: canteen_backend
    platform: linux/arm64/v8
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root123456
      - DB_NAME=canteen_system
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_jwt_secret_key_here_production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - canteen_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: canteen_frontend
    platform: linux/arm64/v8
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - canteen_network

networks:
  canteen_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
